<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomePage</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/home.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

<section class="hero">
    <div class="hero-nav">
        <a href="/" class="nav-btn">Home</a>
        {% if session.get('admin') %}
            <a href="/listusers" class="nav-btn">Students</a>
            <a href="/logout" class="nav-btn">Logout</a>
        {% else %}
            <a href="/login" class="nav-btn">Admin Login</a>
        {% endif %}
    </div>

    <div class="hero-center">
        <img src="{{ url_for('static', filename='images/images.png') }}" class="hero-icon" alt="icon">
        <h2 class="company">Abhishek Technologies</h2>
        <p class="presents">presents</p>
        <h1 class="face-title">F.A.C.E</h1>
        <h2 class="main-title">
            FACIAL ATTENDANCE AND CONTROL ENGINE
        </h2>
        <p class="subtitle">
            An AI system that marks attendance using facial recognition.
        </p>
        <a href="/attendance" class="btn">Get Started</a>
    </div>

    <footer class="bottom-bar">
        <div class="left-info">
            © FACE 2026 - About - Privacy
        </div>
        <div class="right-share">
            <span>Share</span>
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
        </div>
    </footer>
</section>
</body>
</html>
