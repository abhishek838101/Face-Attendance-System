<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 100vh;
    margin: 0;
    background: url("/static/images/bg.jpg") no-repeat center center/cover;
    background-attachment: fixed;
    font-family: "Poppins", sans-serif;
    color: white;
    position: relative;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
}

.logo {
    display: flex;
    align-items: center;
    /* gap: 10px; */
}

.logo img {
    width: 40px;
}

.brand {
    text-decoration: none;
    color: #fff;
    font-size: 20px;
    font-weight: 600;
}
.nav-links {
    display: flex;
    align-items: center;
    gap: 25px;
    margin-left: auto;
}
.nav-links a {
    text-decoration: none;
    color: white;
    font-weight: 500;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #00c6ff;
}

main {
    padding: 40px;
}

.action-buttons {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.btn {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.btn-add {
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
}

.btn-delete {
    background: linear-gradient(90deg, #ff4b2b, #ff416c);
    color: white;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* TABLE */
.student-table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    overflow: hidden;
}

.student-table th,
.student-table td {
    padding: 15px;
    text-align: left;
}

.student-table th {
    background: rgba(0,0,0,0.4);
}

.student-table tr {
    transition: 0.3s;
}

.student-table tr:hover {
    background: rgba(255,255,255,0.1);
}

/* MODAL BACKDROP */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* HIDDEN */
.hidden {
    display: none;
}

.modal-content {
    width: 350px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 25px;
    border-radius: 15px;
    color: #fff;
    position: relative;
    animation: fadeIn 0.3s ease-in-out;
}

@keyframes fadeIn {
    from {transform: scale(0.8); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

.modal-content h2 {
    margin-bottom: 15px;
}

.close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    background: none;
    border: none;
    font-size: 20px;
    color: #fff;
    cursor: pointer;
}

.modal-content input,
.modal-content select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    outline: none;
}

.modal-content p {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.8;
}

.home-btn {
    font-weight: 700;
    font-size: 18px;
    padding: 6px 12px;
    transition: 0.3s;
}

.home-btn:hover {
    color: black;
}
</style>
</head>

<body>

<header class="navbar">

    <nav class="nav-links">
        <a href="/" class="home-btn">Home</a>
        <a href="/attendance">Attendance</a>
        {% if session.get('admin') %}
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Admin Login</a>
        {% endif %}
    </nav>

</header>

<main>

<div class="action-buttons">
    <button onclick="showModal('addModal')" class="btn btn-add">Add New Student</button>
    <button onclick="showModal('deleteModal')" class="btn btn-delete">Delete Student</button>
</div>
{% if error %}
<p style="color:red; font-weight:bold;">{{ error }}</p>
{% endif %}
<table class="student-table">
    <thead>
        <tr>
            <th>S.NO</th>
            <th>ID</th>
            <th>Name</th>
        </tr>
    </thead>
    <tbody>
        {% for i in range(l) %}
        <tr>
            <td>{{ i+1 }}</td>
            <td>{{ rolls[i] }}</td>
            <td>{{ names[i] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<div id="deleteModal" class="modal hidden">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal('deleteModal')">&times;</button>
        <h2>Delete User</h2>
        <form action="/deleteuser" method="GET">
            <select name="user" required>
                <option disabled selected>Select User</option>
                {% for user in usernames_with_rolls %}
                <option value="{{ user }}">{{ user }}</option>
                {% endfor %}
            </select>
            <button class="btn btn-delete" style="width:100%;margin-top:10px;">Delete</button>
        </form>
    </div>
</div>

<div id="addModal" class="modal hidden">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal('addModal')">&times;</button>
        <h2>Add Student</h2>
        <form action="/add" method="POST">
            <input type="text" name="newusername" placeholder="Name" required>
            <input type="number" name="newuserid" placeholder="ID" required>
            <button class="btn btn-add" style="width:100%;margin-top:10px;">Add User</button>
        </form>
        <p>Total Users: <strong>{{ totalreg }}</strong></p>
    </div>
</div>

</main>

<script>
function showModal(id){
    document.getElementById(id).classList.remove('hidden');
}
function closeModal(id){
    document.getElementById(id).classList.add('hidden');
}
</script>

</body>
</html>
