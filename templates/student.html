<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/student.css') }}">

</head>
<body>
<header class="navbar">
    <nav class="nav-links">
        <a href="/" class="home-btn">Home</a>
        <a href="/attendance">Attendance</a>
        {% if session.get('admin') %}
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Admin Login</a>
        {% endif %}
    </nav>
</header>
<main>
<div class="action-buttons">
    <button onclick="showModal('addModal')" class="btn btn-add">Add New Student</button>
    <button onclick="showModal('deleteModal')" class="btn btn-delete">Delete Student</button>
</div>
{% if error %}
<p style="color:red; font-weight:bold;">{{ error }}</p>
{% endif %}
<table class="student-table">
    <thead>
        <tr>
            <th>S.NO</th>
            <th>ID</th>
            <th>Name</th>
        </tr>
    </thead>
    <tbody>
        {% for i in range(l) %}
        <tr>
            <td>{{ i+1 }}</td>
            <td>{{ rolls[i] }}</td>
            <td>{{ names[i] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<div id="deleteModal" class="modal hidden">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal('deleteModal')">&times;</button>
        <h2>Delete User</h2>
        <form action="/deleteuser" method="GET">
            <select name="user" required>
                <option disabled selected>Select User</option>
                {% for user in usernames_with_rolls %}
                <option value="{{ user }}">{{ user }}</option>
                {% endfor %}
            </select>
            <button class="btn btn-delete" style="width:100%;margin-top:10px;">Delete</button>
        </form>
    </div>
</div>

<div id="addModal" class="modal hidden">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal('addModal')">&times;</button>
        <h2>Add Student</h2>
        <form action="/add" method="POST">
            <input type="text" name="newusername" placeholder="Name" required>
            <input type="number" name="newuserid" placeholder="ID" required>
            <button class="btn btn-add" style="width:100%;margin-top:10px;">Add User</button>
        </form>
        <p>Total Users: <strong>{{ totalreg }}</strong></p>
    </div>
</div>
</main>

<script>
function showModal(id){
    document.getElementById(id).classList.remove('hidden');
}
function closeModal(id){
    document.getElementById(id).classList.add('hidden');
}
</script>
</body>
</html>
